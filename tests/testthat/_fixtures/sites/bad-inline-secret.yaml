sites:
  - site_id: piggery_north
    latitude: -34.75
    longitude: 148.20
    elevation: 220
    timezone: Australia/Sydney
    store_root: /data/meteo/piggery_north
    instruments:
      - name: thermo
        variable: [temperature_2m, relative_humidity_2m]
        height: 2
    sources:
      site_aws:
        adapter: rest
        endpoint: "https://aws.example/api?site={site}&from={from}&to={to}"
        # A literal token where only a *_env reference is allowed -> inline_secret.
        token: abc123SECRET

sites:
  - site_id: piggery_north
    latitude: -34.75
    longitude: 148.20
    elevation: 220
    timezone: Australia/Sydney
    store_root: /data/meteo/piggery_north
    instruments:
      - name: anemometer
        variable: [wind_speed_10m, wind_direction_10m, wind_gusts_10m]
        height: 10
        roughness_length: 0.03
    sources:
      silo:
        adapter: silo
        api_key_env: SILO_EMAIL
  - site_id: piggery_south
    latitude: -35.10
    longitude: 148.55
    elevation: 260
    timezone: Australia/Sydney
    store_root: /data/meteo/piggery_south
    instruments:
      - name: thermo
        variable: [temperature_2m, relative_humidity_2m]
        height: 2
    sources:
      silo:
        adapter: silo
        api_key_env: SILO_EMAIL
